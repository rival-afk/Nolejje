<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta href="darkreader-lock">
  <title>Nolejje</title>
  <link rel="icon" type="image/png" href="img/icon.png">
  <link href="css/dashboard.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;700&display=swap" rel="stylesheet">  <!шрифт unbounded--!>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet"> <!шрифт jetbrains mono--!>
</head>
<body>
  <div class="a1"></div>
  <div class="a2"></div>
  <header class="header">
    <a id="icon" href="index">
      <img src="img/nolejje_dark.png" alt="Логотип Nolejje">
    </a>
    <nav id="header-nav">
      <a class="header-nav-a" href="index">Главная</a>
      <a class="header-nav-a" href="#">Оценки</a>
      <a class="header-nav-a" href="developer">Разработчик</a>
    </nav>
  </header>
  <div id="student-dashboard">
    <div id="user-info">
      <h1 id="user-name"></h1>
      <span id="user-class"></span>
    </div>
    <span class="red-title">Домашние Задания</span>
    <div id="homework"></div>
  </div>
  <div id="teacher-dashboard" style="display: none;">
    <div class="dashboard">
      <div class="sidebar">
        <h2>Классы</h2>
        <div id="class-list" class="class-list"></div>
      </div>
      <div class="main">
        <div class="main-header">
          <h1 id="class-title">Выберите класс</h1>
        </div>
        <div id="students"></div>
        <div class="panel">
          <h2 class="h2">Добавить задание</h2>
          <input id="hw-title" placeholder="Название">
          <input id="hw-desc" placeholder="Описание">
          <button id="add-hw">Добавить</button>
        </div>
      </div>
    </div>
  </div>
  <div id="admin-dashboard">
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <div class="logo">Nolejje</div>
        <nav>
          <div class="nav-item active" data-page="assign">Назначения</div>
          <div class="nav-item" data-page="classes">Классы</div>
          <div class="nav-item" data-page="teachers">Учителя</div>
          <div class="nav-item" data-page="analytics">Аналитика</div>
          <div class="nav-item" data-page="reports">Жалобы</div>
        </nav>
      </aside>
      <main class="admin-main" id="admin-content"></main>
    </div>
  </div>
</body>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
</html>
