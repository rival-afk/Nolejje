<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="img/icon.png">
  <meta name="darkreader-lock">
  <title>Профиль — Nolejje</title>
  <link href="css/pages.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="page-root">
    <header class="header">
      <div class="header-left">
        <a href="/" class="logo"><img src="img/nolejje_dark.png" alt="Nolejje"></a>
      </div>
      <div class="header-center">
        <nav id="header-nav">
          <a class="header-nav-a" href="/">Главная</a>
          <a class="header-nav-a" href="dashboard">Дэшборд</a>
          <a class="header-nav-a" href="developer">Разработчик</a>
          <a class="header-nav-a active" href="profile">Профиль</a>
        </nav>
      </div>
      <div class="header-right">
        <div id="header-user">
          <span id="header-role-badge"></span>
          <span id="header-username"></span>
          <button class="header-btn" id="logout-btn">Выйти</button>
        </div>
      </div>
    </header>

    <main class="page-content profile-page">
      <section class="profile-panel">
        <div class="profile-header-row">
          <div>
            <span class="section-tag">ПРОФИЛЬ</span>
            <h1>Личный кабинет</h1>
            <p class="profile-description">Здесь можно изменить имя, загрузить аватар и удалить аккаунт.</p>
          </div>
        </div>

        <div class="profile-grid">
          <div class="profile-card">
            <div class="avatar-preview" id="avatar-preview">A</div>
            <label class="file-field">
              <span>Загрузить аватар</span>
              <input type="file" id="avatar-input" accept="image/*">
            </label>
            <button class="action-button" id="upload-avatar">Сохранить аватар</button>
          </div>

          <div class="profile-card profile-form-card">
            <div class="form-row">
              <label>Имя</label>
              <input id="profile-name" type="text" placeholder="Ваше имя">
            </div>
            <div class="form-row">
              <label>Почта</label>
              <input id="profile-email" type="email" readonly>
            </div>
            <div class="form-row">
              <label>Роль</label>
              <input id="profile-role" type="text" readonly>
            </div>
            <button class="action-button" id="save-name">Сохранить имя</button>
            <div class="form-divider"></div>
            <button class="danger-button" id="delete-account">Удалить аккаунт</button>
            <p class="profile-note">Удаление аккаунта приведёт к выходу из системы и удалению данных. Требуется подтверждение.</p>
            <div class="status-message" id="profile-message"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
